name: pkgcheck

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["R-CMD-check"]
    types: [completed]
    branches:
      - main

permissions:
  actions: read
  contents: read

jobs:
  pkgcheck:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      NOT_CRAN: true
      ROPENSCI: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-tinytex@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y universal-ctags libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R dependencies
        shell: Rscript {0}
        run: |
          cran <- Sys.getenv("RSPM", unset = "https://cloud.r-project.org")
          options(repos = c(
            ropenscireviewtools = "https://ropensci-review-tools.r-universe.dev",
            CRAN = cran
          ))
          install.packages("pak")
          pak::pak(c("local::.", "pkgcheck", "visNetwork"), dependencies = TRUE)

      - name: Run pkgcheck
        shell: Rscript {0}
        run: |
          cran <- Sys.getenv("RSPM", unset = "https://cloud.r-project.org")
          options(repos = c(
            ropenscireviewtools = "https://ropensci-review-tools.r-universe.dev",
            CRAN = cran
          ))

          checks <- pkgcheck::pkgcheck(".", use_cache = FALSE)
          website_check_present <- "repo_has_website" %in% names(checks$checks)
          website_check_failed <- website_check_present && !isTRUE(checks$checks$repo_has_website)
          failed_checks <- names(checks$checks)[
            vapply(checks$checks, function(x) !isTRUE(x), logical(1))
          ]
          pkgdown_url <- ""
          if (file.exists("_pkgdown.yml")) {
            pkgdown_cfg <- readLines("_pkgdown.yml", warn = FALSE)
            pkgdown_url_line <- grep("^url\\s*:", pkgdown_cfg, value = TRUE)
            if (length(pkgdown_url_line) > 0L) {
              pkgdown_url <- trimws(sub("^url\\s*:\\s*", "", pkgdown_url_line[1]))
              pkgdown_url <- gsub("^[\"']|[\"']$", "", pkgdown_url)
            }
          }
          pkgdown_url_reachable <- FALSE
          if (nzchar(pkgdown_url)) {
            pkgdown_url_reachable <- isTRUE(tryCatch({
              readLines(pkgdown_url, n = 1L, warn = FALSE)
              TRUE
            }, error = function(e) FALSE))
          }

          md <- pkgcheck::checks_to_markdown(checks, render = FALSE)
          writeLines(md, "pkgcheck.md")

          summary_end <- grep("^---$", md)[1]
          summary_lines <- md[seq_len(summary_end - 1)]
          step_summary <- Sys.getenv("GITHUB_STEP_SUMMARY")
          if (nzchar(step_summary)) {
            writeLines(summary_lines, step_summary)
          }

          network_file <- attr(md, "network_file")
          if (length(network_file) == 1L && file.exists(network_file)) {
            file.copy(network_file, "pkgcheck-network.html", overwrite = TRUE)
          }

          print(summary(checks))
          checks_okay <- isTRUE(attr(md, "checks_okay"))
          ignore_repo_homepage_check <- website_check_failed &&
            pkgdown_url_reachable &&
            length(failed_checks) == 1L &&
            identical(failed_checks, "repo_has_website")
          if (!checks_okay && ignore_repo_homepage_check) {
            checks_ignoring_website <- checks
            checks_ignoring_website$checks$repo_has_website <- TRUE
            checks_okay <- isTRUE(
              attr(
                pkgcheck::checks_to_markdown(checks_ignoring_website, render = FALSE),
                "checks_okay"
              )
            )
          }
          if (!checks_okay) {
            quit(status = 1, save = "no")
          }
          if (ignore_repo_homepage_check) {
            message(
              paste0(
                "pkgcheck reported missing GitHub homepage metadata, ",
                "but _pkgdown.yml url is reachable: ",
                pkgdown_url
              )
            )
          }

      - name: Upload pkgcheck artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pkgcheck-results
          path: |
            pkgcheck.md
            pkgcheck-network.html
          if-no-files-found: ignore
